name: Fetch Finance Hot List

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "fetch_finance.py"
      - "requirements.txt"
      - ".github/workflows/fetch_finance.yml"

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run fetch script
        run: python fetch_finance.py
        env:
          TZ: Asia/Shanghai

      - name: Commit and push data files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          if [[ -n "$(git status --porcelain data/)" ]]; then
            git add data/*.json
            git commit -m "自动更新: 抓取财经热榜 $(date +'%Y-%m-%d %H:%M:%S' -u)"
            git push
            echo "数据已提交并推送"
          else
            echo "无数据变更，跳过提交"
          fi
