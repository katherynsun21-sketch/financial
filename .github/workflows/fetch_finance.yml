name: Fetch Finance Hot List

on:
  schedule:
    # 每 2 小时运行一次 (北京时间 00:00, 02:00, 04:00...)
    - cron: "0 */2 * * *"
  # 支持手动触发
  workflow_dispatch:
  # 每次推送到 main 分支时运行一次作为测试
  push:
    branches: [main]
    paths:
      - "fetch_finance.py"
      - "requirements.txt"
      - ".github/workflows/fetch_finance.yml"

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run fetch script
        run: python fetch_finance.py
        env:
          TZ: Asia/Shanghai
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}

      - name: Commit and push data files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # 设置允许检出
          git pull --rebase || true

          # 检查 data 目录是否有变更
          if [[ -n "$(git status --porcelain data/)" ]]; then
            git add data/*.json
            git commit -m "自动更新: 抓取财经热榜 $(date +'%Y-%m-%d %H:%M:%S' -u)"
            git push
            echo "数据已提交并推送"
          else
            echo "无数据变更，跳过提交"
          fi
