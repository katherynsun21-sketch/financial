name: Fetch Finance Hot List

on:
  schedule:
    # 每 2 小时自动抓一次（北京时间整点）
    - cron: "0 */2 * * *"
  # 支持在 Actions 页面手动点 Run workflow 触发
  workflow_dispatch:
  # 每次推送到 main 分支，自动跑一次作为验证
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # ================= 火山引擎 Ark 配置 =================
    # ⚠️ 把下面的 LLM_MODEL 替换成你在方舟控制台创建的 Endpoint ID
    #   形如: ep-20250610xxxxxx
    # ⚠️ LLM_API_KEY 从 Secrets 读取，请先去 Settings → Secrets and variables → Actions
    #   → New repository secret → Name 填 LLM_API_KEY, Secret 填你的 Ark API Key
    env:
      LLM_BASE_URL: https://ark.cn-beijing.volces.com/api/v3
      LLM_MODEL: ep-20260610203528-fmwd5          # ← 改成你自己的，例如 ep-20250610abcdef
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      TZ: Asia/Shanghai

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run fetch + LLM classification
        run: python fetch_finance.py

      - name: Commit and push JSON data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          if [[ -n "$(git status --porcelain data/)" ]]; then
            git add data/*.json
            git commit -m "自动更新: 抓取财经热榜 $(date +'%Y-%m-%d %H:%M:%S' -u)"
            git push
            echo "数据已提交并推送"
          else
            echo "无数据变更，跳过提交"
          fi
